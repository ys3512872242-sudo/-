<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floating Notes Wall</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}
body{
  overflow:hidden;
  width:100vw;
  height:100vh;
  background:
  radial-gradient(
    circle at top,
    #f8f6f3 0%,
    #f1efeb 45%,
    #ebe7e2 100%
  );
  font-family:
  "PingFang SC",
  "Microsoft YaHei",
  sans-serif;
}
/* 微颗粒 */
body::after{
  content:"";
  position:fixed;
  inset:0;
  opacity:0.025;
  pointer-events:none;
  background-image:
  radial-gradient(
    rgba(0,0,0,0.7) 0.5px,
    transparent 0.5px
  );
  background-size:4px 4px;
}
/* 留言 */
.note{
  position:absolute;
  left:100vw;
  width:640px;
  min-height:120px;
  padding:
  22px 28px;
  border-radius:28px;
  line-height:1.95;
  font-weight:300;
  letter-spacing:0.45px;
  color:#565656;
  background:
  rgba(255,255,255,0.34);
  border:
  1px solid rgba(255,255,255,0.42);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  box-shadow:
  0 10px 40px rgba(0,0,0,0.04),
  0 3px 12px rgba(0,0,0,0.03);
  animation-name:move;
  animation-timing-function:linear;
  animation-fill-mode:forwards;
  overflow:hidden;
}
/* 内容 */
.note-content{
  font-size:18px;
  word-break:break-word;
}
/* 来源 */
.note-meta{
  margin-top:16px;
  font-size:12px;
  letter-spacing:1.2px;
  color:rgba(0,0,0,0.32);
}
/* 远近层 */
.layer1{
  opacity:0.5;
}
.layer2{
  opacity:0.72;
}
.layer3{
  opacity:0.96;
}
/* 漂浮 */
@keyframes move{
  0%{
    transform:
    translateX(0)
    translateY(0px);
  }
  25%{
    transform:
    translateX(-60vw)
    translateY(-5px);
  }
  50%{
    transform:
    translateX(-120vw)
    translateY(3px);
  }
  75%{
    transform:
    translateX(-180vw)
    translateY(-4px);
  }
  100%{
    transform:
    translateX(-250vw)
    translateY(2px);
  }
}
/* 右下角 */
.signature{
  position:fixed;
  right:26px;
  bottom:20px;
  font-size:12px;
  letter-spacing:2px;
  color:rgba(0,0,0,0.16);
}
</style>
</head>
<body>
<div class="signature">
FLOATING NOTES
</div>
<script>
/* =========================
   留言数据
========================= */
const notes = [
{
  text:"想告诉你，稻城亚丁的星空真的很近，仿佛踮起脚尖就能摘下一颗。清晨的牛奶海泛着淡淡的钴蓝色，风从雪山上吹下来，带着冰川的凛冽和草甸的清香。",
  from:"四川 · 2024"
},
{
  text:"我们像两列夜行的火车，在某个小站短暂交会，汽笛长鸣之后，又各自驶入茫茫的夜色。铁轨在月光下闪着冷光，伸向看不见的远方。",
  from:"凌晨 02:17"
},
{
  text:"旧书店的猫睡在泛黄的书页上，阳光透过木窗把空气中的灰尘变成金色的碎屑。我抽出一本诗集，扉页上有人用钢笔写着‘致十年后的自己’。",
  from:"匿名留言"
},
{
  text:"你听过春雨落在瓦片上的声音吗？密密的，软软的，像很多只小蚕在啃桑叶。巷子里的青石板被洗得发亮，倒映着屋檐下灯笼的红光。",
  from:"杭州 · 春天"
},
{
  text:"我们坐在海边等日落，云层很厚，以为要失望了。就在转头喝水的瞬间，天边裂开一道缝，金色的光倾泻而下，把整个海面熔成了流动的铜。",
  from:"海边"
}
];
/* =========================
   轨道
========================= */
const tracks = [
  { top:6 , free:true },
  { top:28, free:true },
  { top:50, free:true },
  { top:72, free:true }
];
const layers = [
  "layer1",
  "layer2",
  "layer3"
];
/* =========================
   工具
========================= */
function random(min,max){
  return Math.random()*(max-min)+min;
}
function pick(arr){
  return arr[
    Math.floor(Math.random()*arr.length)
  ];
}
/* =========================
   创建留言
========================= */
function createNote(track){
  track.free = false;
  const data = pick(notes);
  const note =
  document.createElement("div");
  note.className =
  "note " + pick(layers);
  note.style.top =
  track.top + "vh";
  /* 时长 */
  const duration =
  random(34,52);
  note.style.animationDuration =
  duration + "s";
  /* 微旋转 */
  note.style.rotate =
  random(-0.5,0.5) + "deg";
  note.innerHTML =
  `
    <div class="note-content">
      ${data.text}
    </div>
    <div class="note-meta">
      ${data.from}
    </div>
  `;
  document.body.appendChild(note);
  /* 关键 */
  /* 等卡片右边进入屏幕后 */
  /* 才允许下一条进入 */
  const releaseTime =
  duration * 1000 * 0.42;
  setTimeout(()=>{
    track.free = true;
  },releaseTime);
  note.addEventListener(
    "animationend",
    ()=>{
      note.remove();
    }
  );
}
/* =========================
   主循环
========================= */
function loop(){
  tracks.forEach(track=>{
    if(track.free){
      createNote(track);
    }
  });
  setTimeout(loop,1800);
}
/* =========================
   初始
========================= */
tracks.forEach((track,index)=>{
  setTimeout(()=>{
    createNote(track);
  },index*700);
});
setTimeout(()=>{
  loop();
},3000);
</script>
</body>
</html>
