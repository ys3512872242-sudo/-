<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>弹幕墙</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:#f9f7f4;
  font-family:
    "PingFang SC",
    "Hiragino Sans GB",
    "Microsoft YaHei",
    sans-serif;
}

#stage{
  position:relative;
  width:100%;
  height:100%;
  overflow:hidden;

  -webkit-mask-image:
    linear-gradient(
      to bottom,
      transparent 0%,
      black 8%,
      black 92%,
      transparent 100%
    );

  mask-image:
    linear-gradient(
      to bottom,
      transparent 0%,
      black 8%,
      black 92%,
      transparent 100%
    );
}

.danmu{
  position:absolute;
  white-space:nowrap;
  pointer-events:none;
  will-change:transform;
}

#qr-corner{
  position:fixed;
  right:20px;
  bottom:20px;

  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;

  padding:10px;

  border-radius:14px;

  background:rgba(249,247,244,0.95);

  box-shadow:
    0 4px 20px rgba(0,0,0,0.08);

  z-index:99;
}

#qr-corner img{
  width:110px;
  height:110px;
  border-radius:10px;
  display:block;
}

#qr-corner p{
  font-size:11px;
  color:#888;
  letter-spacing:0.08em;
}

#status{
  position:fixed;
  left:20px;
  bottom:20px;

  font-size:12px;
  color:#999;

  transition:opacity 1s;
}
</style>
</head>

<body>

<div id="stage"></div>

<div id="qr-corner">
  <img id="qr-img" src="./qr.png" alt="二维码">
  <p>扫码发弹幕</p>
</div>

<div id="status">
连接中…
</div>

<script>
const SUPABASE_URL =
"https://pqlgjyohaoskvloxyulr.supabase.co";

const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxbGdqeW9oYW9za3Zsb3h5dWxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MTMyMzIsImV4cCI6MjA5NTE4OTIzMn0.PIkyWzRuE1nijFHBv6jItCJvVgaTp2ftHXTp2lWZELs";

const TABLE = "messages";

const DEFAULT_TEXTS = [
  "对于电影来说，最打动我的从来不是台词，是演员背对镜头的那几秒",
  "电影而不是胜利的真理，将被我们传播直至永恒"
];

const TRACK_COUNT = 10;

const stage =
document.getElementById("stage");

const statusEl =
document.getElementById("status");

const COLORS = [
  "#1a1a1a",
  "#2c2c2c",
  "#444",
  "#555",
  "#333",
  "#c0392b"
];

const trackFreeAt =
new Array(TRACK_COUNT).fill(0);

function pickTrack(){

  let best = 0;

  for(let i = 1; i < TRACK_COUNT; i++){

    if(trackFreeAt[i] < trackFreeAt[best]){
      best = i;
    }

  }

  return best;
}

function shoot(text,isUser){

  const W = stage.offsetWidth;
  const H = stage.offsetHeight;

  const ti = pickTrack();

  const trackH = H / TRACK_COUNT;

  const top =
    ti * trackH +
    trackH * 0.1 +
    Math.random() * trackH * 0.55;

  const speed =
    isUser
    ? 70 + Math.random() * 20
    : 40 + Math.random() * 20;

  const fontSize =
    isUser
    ? 18 + Math.random() * 4
    : 14 + Math.random() * 6;

  const color =
    isUser
    ? "#c0392b"
    : COLORS[
      Math.floor(
        Math.random() * COLORS.length
      )
    ];

  const opacity =
    isUser
    ? 1
    : 0.5 + Math.random() * 0.4;

  const el =
    document.createElement("div");

  el.className = "danmu";

  el.textContent = text;

  el.style.top = top + "px";

  el.style.left =
    (W + 20) + "px";

  el.style.fontSize =
    fontSize + "px";

  el.style.color = color;

  el.style.opacity = opacity;

  el.style.fontWeight =
    isUser ? "600" : "400";

  stage.appendChild(el);

  requestAnimationFrame(()=>{

    const elW = el.offsetWidth;

    const duration =
      (W + elW + 50) / speed;

    trackFreeAt[ti] =
      Date.now() +
      ((elW + 60) / speed) * 1000;

    el.style.transition =
      `left ${duration}s linear`;

    el.style.left =
      (-elW - 30) + "px";

    setTimeout(()=>{
      el.remove();
    }, duration * 1000 + 500);

  });

}

/* 默认弹幕 */

let defIndex = 0;

function loopDefault(){

  setTimeout(()=>{

    shoot(
      DEFAULT_TEXTS[
        defIndex %
        DEFAULT_TEXTS.length
      ],
      false
    );

    defIndex++;

    loopDefault();

  },1800 + Math.random() * 2500);

}

shoot(DEFAULT_TEXTS[0],false);

setTimeout(()=>{
  shoot(DEFAULT_TEXTS[1],false);
},1200);

setTimeout(()=>{
  loopDefault();
},2500);

/* Supabase */

const HEADERS = {
  "apikey":SUPABASE_KEY,
  "Authorization":
    "Bearer " + SUPABASE_KEY,
  "Content-Type":
    "application/json"
};

let lastId = 0;

async function init(){

  try{

    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${TABLE}?select=id,content&order=id.desc&limit=20`,
      {
        headers:HEADERS
      }
    );

    if(!res.ok){
      throw new Error(
        await res.text()
      );
    }

    const data =
      await res.json();

    if(data && data.length > 0){

      lastId = data[0].id;

      [...data]
      .reverse()
      .forEach((row,i)=>{

        if(
          row.content &&
          row.content.trim()
        ){

          setTimeout(()=>{

            shoot(
              row.content.trim(),
              true
            );

          },i * 600);

        }

      });

    }

    statusEl.textContent =
      "已连接 ✦";

    setTimeout(()=>{
      statusEl.style.opacity = "0";
    },3000);

  }catch(e){

    statusEl.textContent =
      "连接失败";

    console.error(e);

  }

}

async function poll(){

  try{

    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${TABLE}?select=id,content&id=gt.${lastId}&order=id.asc`,
      {
        headers:HEADERS
      }
    );

    if(!res.ok) return;

    const data =
      await res.json();

    if(!data || data.length === 0){
      return;
    }

    data.forEach((row,i)=>{

      if(
        row.content &&
        row.content.trim()
      ){

        setTimeout(()=>{

          shoot(
            row.content.trim(),
            true
          );

        },i * 400);

      }

      if(row.id > lastId){
        lastId = row.id;
      }

    });

  }catch(e){

    console.error(e);

  }

}

init();

setInterval(poll,2000);
</script>

</body>
</html>
