<style>
*{ margin:0; padding:0; box-sizing:border-box; }
body{
  width:100vw; height:100vh;
  overflow:hidden;
  background:#ede8e0;
  font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
}
#stage{
  position:relative; width:100%; height:100%;
  overflow:hidden; z-index:1;
  -webkit-mask-image:linear-gradient(to bottom,transparent 0%,black 6%,black 94%,transparent 100%);
  mask-image:linear-gradient(to bottom,transparent 0%,black 6%,black 94%,transparent 100%);
}
.danmu{
  position:absolute;
  pointer-events:none;
  will-change:left;
  width:200px;
  white-space:normal;
  word-break:break-all;
  line-height:1.7;
  padding:14px 16px;
  border-radius:4px;
  background:#fffdf4;
  box-shadow:2px 3px 10px rgba(0,0,0,0.10), 0 1px 3px rgba(0,0,0,0.06);
  font-size:14px;
  color:#2a2420;
  font-weight:400;
  letter-spacing:0.04em;
}
/* 便利贴顶部那条彩色胶带感 */
.danmu::before{
  content:"";
  position:absolute;
  top:0; left:0; right:0;
  height:4px;
  border-radius:4px 4px 0 0;
  background:var(--tape);
  opacity:0.6;
}

#qr-corner{
  position:fixed; right:24px; bottom:24px;
  display:flex; flex-direction:column; align-items:center; gap:8px;
  padding:12px; border-radius:4px;
  background:#fffdf4;
  box-shadow:2px 3px 10px rgba(0,0,0,0.10);
  z-index:99;
}
#qr-corner canvas{ border-radius:2px; display:block; }
#qr-corner p{ font-size:11px; color:#b0a898; letter-spacing:0.1em; }

#theme{
  position:fixed; left:24px; bottom:24px;
  z-index:99; display:flex; flex-direction:column; gap:4px;
}
#theme .t1{ font-size:13px; color:#c8b89a; letter-spacing:0.2em; }
#theme .t2{ font-size:11px; color:#d0c4b4; letter-spacing:0.12em; }

#status{
  position:fixed; left:24px; bottom:62px;
  font-size:11px; color:#ccc; letter-spacing:0.05em;
  transition:opacity 1.5s; z-index:99;
}
</style>

const TRACK_COUNT = 6;
const stage    = document.getElementById("stage");
const statusEl = document.getElementById("status");
const trackFreeAt = new Array(TRACK_COUNT).fill(0);

function pickTrack(){
  let best=0;
  for(let i=1;i<TRACK_COUNT;i++){
    if(trackFreeAt[i]<trackFreeAt[best]) best=i;
  }
  return best;
}
function rand(a,b){ return a+Math.random()*(b-a); }

function shoot(text, isUser){
  const W=stage.offsetWidth, H=stage.offsetHeight;
  const ti=pickTrack();
  const trackH=H/TRACK_COUNT;
  const top=ti*trackH + trackH*0.08 + Math.random()*trackH*0.5;
  const speed = isUser ? rand(45,65) : rand(30,50);
  const tape  = TAPES[Math.floor(Math.random()*TAPES.length)];

  const el=document.createElement("div");
  el.className="danmu";
  el.textContent=text;
  el.style.cssText=`
    top:${top}px;
    left:${W+20}px;
    --tape:${tape};
    opacity:${isUser ? 1 : 0.75};
  `;
  stage.appendChild(el);

  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const elW=el.offsetWidth;
    const elH=el.offsetHeight;
    const dur=(W+elW+60)/speed;
    // 轨道占位按实际高度算
    trackFreeAt[ti]=Date.now()+((elW+60)/speed)*1000;
    el.style.transition=`left ${dur}s linear`;
    el.style.left=(-elW-40)+"px";
    setTimeout(()=>el.remove(), dur*1000+500);
  }));
}

// 默认文案随机循环
const shuffled=[...DEFAULT_TEXTS].sort(()=>Math.random()-0.5);
let defIdx=0;
function loopDefault(){
  setTimeout(()=>{
    shoot(shuffled[defIdx%shuffled.length], false);
    defIdx++;
    if(defIdx%shuffled.length===0) shuffled.sort(()=>Math.random()-0.5);
    loopDefault();
  }, rand(1200,3500));
}
for(let i=0;i<4;i++){
  setTimeout(()=>{
    shoot(shuffled[defIdx%shuffled.length], false);
    defIdx++;
  }, i*500);
}
setTimeout(loopDefault, 2200);

// 历史留言延迟混入
let historyQueue=[];
function drainHistory(){
  if(historyQueue.length===0) return;
  shoot(historyQueue.shift(), true);
  setTimeout(drainHistory, rand(1500,3500));
}

// 二维码
(function(){
  const CDNS=[
    "https://cdn.bootcdn.net/ajax/libs/qrcodejs/1.0.0/qrcode.min.js",
    "https://cdn.staticfile.org/qrcodejs/1.0.0/qrcode.min.js",
    "https://lf26-cdn-tos.bytecdntp.com/cdn/expire-1-M/qrcodejs/1.0.0/qrcode.min.js"
  ];
  function tryLoad(i){
    if(i>=CDNS.length){ document.getElementById("qr-corner").style.display="none"; return; }
    const s=document.createElement("script");
    s.src=CDNS[i];
    s.onload=function(){
      const canvas=document.getElementById("qr-canvas");
      canvas.style.display="none";
      const div=document.createElement("div");
      canvas.parentNode.insertBefore(div,canvas);
      new QRCode(div,{
        text:SUBMIT_URL, width:100, height:100,
        colorDark:"#2a2420", colorLight:"#fffdf4",
        correctLevel:QRCode.CorrectLevel.M
      });
    };
    s.onerror=()=>tryLoad(i+1);
    document.head.appendChild(s);
  }
  tryLoad(0);
})();

// Supabase
const HEADERS={
  "apikey":SUPABASE_KEY,
  "Authorization":"Bearer "+SUPABASE_KEY,
  "Content-Type":"application/json"
};
let lastId=0;

async function init(){
  try{
    const res=await fetch(
      `${SUPABASE_URL}/rest/v1/${TABLE}?select=id,content&order=id.desc&limit=30`,
      {headers:HEADERS}
    );
    if(!res.ok) throw new Error(await res.text());
    const data=await res.json();
    if(data&&data.length>0){
      lastId=data[0].id;
      historyQueue=[...data].reverse().map(r=>r.content&&r.content.trim()).filter(Boolean);
      setTimeout(drainHistory, 5000);
    }
    statusEl.textContent="已连接 ✦";
    setTimeout(()=>{ statusEl.style.opacity="0"; },3000);
  }catch(e){
    statusEl.textContent="连接失败";
    console.error(e);
  }
}

async function poll(){
  try{
    const res=await fetch(
      `${SUPABASE_URL}/rest/v1/${TABLE}?select=id,content&id=gt.${lastId}&order=id.asc`,
      {headers:HEADERS}
    );
    if(!res.ok) return;
    const data=await res.json();
    if(!data||data.length===0) return;
    data.forEach((row,i)=>{
      if(row.content&&row.content.trim())
        setTimeout(()=>shoot(row.content.trim(),true), i*400);
      if(row.id>lastId) lastId=row.id;
    });
  }catch(e){ console.error(e); }
}

init();
setInterval(poll,2000);
</script>
