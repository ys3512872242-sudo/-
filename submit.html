<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>留言</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f7f7f7;
  font-family:sans-serif;
}

.box{
  width:90%;
  max-width:500px;
}

textarea{
  width:100%;
  height:180px;
  border:none;
  padding:18px;
  font-size:18px;
  border-radius:18px;
  resize:none;
  outline:none;
  background:white;
  box-shadow:0 4px 20px rgba(0,0,0,.06);
}

button{
  width:100%;
  margin-top:18px;
  height:54px;
  border:none;
  border-radius:16px;
  background:black;
  color:white;
  font-size:18px;
}
</style>
</head>

<body>

<div class="box">
  <textarea id="msg" placeholder="写点什么吧……"></textarea>
  <button onclick="send()">发送</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://nztqxrfrolpwnhbsquul.supabase.co";

const supabaseKey = "你刚刚那串 anon key";

const supabase = window.supabase.createClient(
  supabaseUrl,
  supabaseKey
);

async function send(){

  const text = document.getElementById("msg").value;

  if(!text.trim()){
    alert("请输入内容");
    return;
  }

  const { error } = await supabase
    .from("messages")
    .insert([
      {
        text:text
      }
    ]);

  if(error){
    alert("发送失败");
    console.log(error);
  }else{
    alert("发送成功");
    document.getElementById("msg").value = "";
  }
}
</script>

</body>
</html>
